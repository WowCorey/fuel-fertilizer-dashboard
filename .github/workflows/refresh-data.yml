name: Weekly data refresh

# Runs scripts/fetch_data.py on a schedule. Any JSON files that change
# are committed back to main with a "chore(data): weekly refresh" message.
# If any source returns an HTTP error the workflow fails loudly so we
# notice link rot.

on:
  schedule:
    # 02:00 AEST on Monday = 16:00 UTC on Sunday (AEST is UTC+10, no DST in QLD;
    # east-coast states observe AEDT UTC+11 in summer — pick AEST and document)
    - cron: "0 16 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Check all source URLs are reachable
        run: python scripts/fetch_data.py --check

      - name: Fetch programmatic sources
        run: python scripts/fetch_data.py

      - name: Ensure manual stub files exist
        run: python scripts/init_manual_stubs.py

      - name: Commit any changed JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data)" ]; then
            git add data
            git commit -m "chore(data): weekly refresh $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          else
            echo "No data changes; nothing to commit."
          fi
