name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile scripts
        run: |
          python -m py_compile scripts/fetch_data.py
          python -m py_compile scripts/enter_manual.py
          python -m py_compile scripts/init_manual_stubs.py
          python -m py_compile scripts/build_source_manifest.py
          python -m py_compile scripts/validate_data.py

      - name: Validate source registry and envelopes
        run: python scripts/validate_data.py

      - name: Check source manifest
        run: python scripts/build_source_manifest.py --check

      - name: Run tests
        run: python -m unittest discover -s tests
