name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check compiled dashboard JS
        run: npm run check:ui

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile scripts
        run: |
          python -m py_compile scripts/fetch_data.py
          python -m py_compile scripts/enter_manual.py
          python -m py_compile scripts/init_manual_stubs.py
          python -m py_compile scripts/build_source_manifest.py
          python -m py_compile scripts/review_due.py
          python -m py_compile scripts/write_refresh_status.py
          python -m py_compile scripts/validate_data.py
          python -m py_compile scripts/validate_trust_status.py

      - name: Validate source registry and envelopes
        run: python scripts/validate_data.py

      - name: Validate trust status manifest
        run: python scripts/validate_trust_status.py

      - name: Check source manifest
        run: python scripts/build_source_manifest.py --check

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run browser smoke tests
        run: npm run smoke:ui
