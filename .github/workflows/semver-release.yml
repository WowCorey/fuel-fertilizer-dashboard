name: Semver release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect semver bump
        id: bump
        run: |
          python scripts/release_semver.py --write > semver.log
          cat semver.log
          if grep -q "No semver bump required" semver.log; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            VERSION_VALUE=$(cat VERSION | tr -d '\n')
            echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.version }}"
          git push

      - name: Create and push tag
        if: steps.bump.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"
