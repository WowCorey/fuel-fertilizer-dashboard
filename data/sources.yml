# Fuel Resilience AU — master source registry
#
# Every dataset shown on the site must appear here. The data pipeline
# (scripts/fetch_data.py) reads this file, attempts to fetch each source
# marked programmatic, and writes normalised JSON to data/generated/.
#
# If a source cannot be fetched safely (PDF-only, JS-rendered, layout-sensitive,
# or requiring human judgement) its JSON file lives in data/manual/ with
# "manual_entry": true, hand-keyed from the named public document.
#
# Never invent values. If a number cannot be verified, the file is written with
# "status": "unavailable" and the UI renders a transparent placeholder.
#
# Source-rights note: repo code and project-authored metadata are licensed
# separately from upstream source data. The source publisher's rights and reuse
# terms always control the underlying data values.
#
# Required fields:
#   id:              slug used as filename (data/{generated|manual}/<id>.json)
#   human_name:      short label shown in the UI footer
#   publisher:       organisation that publishes the data
#   url:             compatibility alias for canonical_url
#   canonical_url:   public landing page for the dataset/source document
#   fetch_url:       machine URL used by programmatic fetchers, when different
#   format:          CSV | JSON | PDF | HTML_TABLE | XLSX | MIXED
#   update_cadence:  daily | weekly | monthly | quarterly | annual | ad-hoc
#   last_verified:   YYYY-MM-DD — last time a human confirmed canonical_url
#   rights:          upstream source rights label
#   rights_url:      upstream licence/terms URL, when known
#   citation:        required or recommended source attribution
#   reuse_notes:     practical caveats for republishing values
#   fetch:           programmatic | manual | unavailable
#   used_by:         dashboard ids that consume this source

