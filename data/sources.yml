# Fuel Resilience AU — master source registry
#
# Every dataset shown on the site must appear here. The data pipeline
# (scripts/fetch_data.py) reads this file, attempts to fetch each source
# programmatically, and writes normalised JSON to data/generated/.
#
# If a source cannot be fetched (PDF-only, JS-rendered, paywalled) its
# JSON file lives in data/manual/ with "manual_entry": true, hand-keyed
# from the named public document.
#
# Never invent values. If a number cannot be verified, the file is
# written with "status": "unavailable" and the UI renders a
# "Source unavailable — awaiting data" placeholder.
#
# Schema for each entry:
#   id:              slug used as filename (data/{generated|manual}/<id>.json)
#   human_name:      short label shown in the UI footer
#   publisher:       organisation that publishes the data
#   url:             canonical landing page for the dataset
#   format:          CSV | JSON | PDF | HTML_TABLE | XLSX | MIXED
#   update_cadence:  monthly | quarterly | annual | weekly | ad-hoc
#   last_verified:   YYYY-MM-DD — last time a human confirmed the URL works
#   licence:         data licence (CC BY 4.0, Crown copyright, etc.)
#   fetch:           programmatic | manual | unavailable
#   used_by:         list of dashboard ids that consume this series

sources:

  # =========================================================
  # FUEL — v1.0 (already live) & v1.2 (oil / production)
  # =========================================================

  - id: aps_monthly
    human_name: Australian Petroleum Statistics (monthly)
    publisher: Department of Climate Change, Energy, the Environment and Water (DCCEEW)
    url: https://www.energy.gov.au/publications/australian-petroleum-statistics
    format: XLSX
    update_cadence: monthly
    last_verified: 2026-04-15
    licence: CC BY 4.0
    fetch: manual          # landing page is HTML, data is inside monthly XLSX — too brittle to scrape blind
    used_by: [fuel, oil]

  - id: abs_petroleum_imports
    human_name: ABS International Merchandise Trade — petroleum imports
    publisher: Australian Bureau of Statistics
