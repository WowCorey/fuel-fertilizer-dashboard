<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px;background:var(--paper)}
.feed{border-top:1px solid var(--rule)}
.item{padding:14px 0;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:baseline}
.date{font-family:var(--font-mono);font-size:var(--fs-12);color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}
.body{font-size:var(--fs-14);color:var(--ink);line-height:1.45}
.tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:2px}
.tag.p{background:var(--caution-tint);color:var(--caution)}
.tag.d{background:var(--deficit-tint);color:var(--deficit)}
.tag.s{background:var(--surplus-tint);color:var(--surplus)}
</style></head><body>
<div class="feed">
  <div class="item"><span class="date">15 Apr 2026</span><span class="body">Singapore refinery outage lifted the Mogas 95 benchmark 6.8% in the week to 12 Apr.</span><span class="tag p">Prices</span></div>
  <div class="item"><span class="date">08 Apr 2026</span><span class="body">Days of net import cover fell to 24, the lowest reading since October 2023.</span><span class="tag d">Cover</span></div>
  <div class="item"><span class="date">02 Apr 2026</span><span class="body">Refinery utilisation at Geelong rose to 91% following scheduled maintenance completion.</span><span class="tag s">Refining</span></div>
</div>
</body></html>
