<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px;background:var(--paper)}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.lbl{width:80px;font-size:var(--fs-12);color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
</style></head><body>
<div class="row"><span class="lbl">Primary</span>
<button class="btn">View methodology</button>
<button class="btn" style="background:var(--accent);border-color:var(--accent)">Hover</button>
<button class="btn" disabled style="opacity:.4;cursor:not-allowed">Disabled</button>
</div>
<div class="row"><span class="lbl">Secondary</span>
<button class="btn btn-secondary">Download CSV</button>
<button class="btn btn-secondary" style="color:var(--accent);border-color:var(--accent)">Hover</button>
</div>
<div class="row"><span class="lbl">Pills</span>
<button class="pill active">All</button>
<button class="pill">1Y</button>
<button class="pill">5Y</button>
<button class="pill">10Y</button>
<button class="pill">Max</button>
</div>
</body></html>
