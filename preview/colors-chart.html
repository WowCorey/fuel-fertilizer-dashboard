<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper)}
.row{display:flex;gap:0;border:1px solid var(--rule);border-radius:var(--r-2);overflow:hidden;background:var(--card);margin-bottom:12px}
.seg{flex:1;height:56px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-family:var(--font-mono);font-size:11px}
.legend{display:flex;gap:20px;align-items:center;padding:8px 0;font-size:var(--fs-13);color:var(--ink-2)}
.dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:6px;vertical-align:-1px}
</style></head><body>
<div class="row">
  <div class="seg" style="background:#1F3A8A">Series 1</div>
  <div class="seg" style="background:#0F766E">Series 2</div>
  <div class="seg" style="background:#B45309">Series 3</div>
  <div class="seg" style="background:#6B7280">Series 4</div>
  <div class="seg" style="background:#991B1B">Series 5</div>
</div>
<div class="legend">
  <span><span class="dot" style="background:#1F3A8A"></span>Primary</span>
  <span><span class="dot" style="background:#0F766E"></span>Comparison</span>
  <span><span class="dot" style="background:#B45309"></span>Watch</span>
  <span><span class="dot" style="background:#6B7280"></span>Baseline</span>
  <span><span class="dot" style="background:#991B1B"></span>Breach</span>
</div>
<p class="caption" style="margin-top:8px">Ordered categorical palette for charts. Use in order; never mix semantic meanings across series.</p>
</body></html>
