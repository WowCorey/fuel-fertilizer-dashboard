<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper)}
.row{display:flex;align-items:center;gap:16px;padding:8px 0}
.bar{background:var(--accent);height:16px;border-radius:2px}
.token{font-family:var(--font-mono);font-size:12px;color:var(--ink-2);width:52px}
.px{font-family:var(--font-mono);font-size:12px;color:var(--ink-3);width:56px;text-align:right}
</style></head><body>
<div class="row"><span class="token">--s-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
<div class="row"><span class="token">--s-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
<div class="row"><span class="token">--s-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
<div class="row"><span class="token">--s-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
<div class="row"><span class="token">--s-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
<div class="row"><span class="token">--s-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
<div class="row"><span class="token">--s-7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
<div class="row"><span class="token">--s-8</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
<div class="row"><span class="token">--s-9</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
<div class="row"><span class="token">--s-10</span><div class="bar" style="width:128px"></div><span class="px">128 px</span></div>
</body></html>
