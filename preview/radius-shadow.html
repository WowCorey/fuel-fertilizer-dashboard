<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper);display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.demo{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:100px;height:72px;background:var(--card);border:1px solid var(--rule)}
.lbl{font-family:var(--font-mono);font-size:12px;color:var(--ink-3)}
.name{font-size:var(--fs-13);font-weight:600;color:var(--ink)}
</style></head><body>
<div class="demo"><div class="box" style="border-radius:0"></div><span class="name">--r-0</span><span class="lbl">0 px · charts, rules</span></div>
<div class="demo"><div class="box" style="border-radius:2px"></div><span class="name">--r-1</span><span class="lbl">2 px · inputs, pills</span></div>
<div class="demo"><div class="box" style="border-radius:4px"></div><span class="name">--r-2</span><span class="lbl">4 px · cards, buttons</span></div>
<div class="demo"><div class="box" style="box-shadow:0 1px 2px rgba(20,24,31,0.04);border-color:transparent"></div><span class="name">--shadow-1</span><span class="lbl">tooltips only</span></div>
<div class="demo"><div class="box" style="box-shadow:0 2px 8px rgba(20,24,31,0.06);border-color:transparent"></div><span class="name">--shadow-2</span><span class="lbl">open menus only</span></div>
</body></html>
