<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:24px;background:var(--paper);display:flex;align-items:center;gap:32px}
.lockup{display:flex;align-items:center;gap:14px}
.mark{width:32px;height:32px;background:var(--ink);position:relative}
.mark::after{content:"";position:absolute;left:9px;top:6px;width:14px;height:2px;background:var(--paper);box-shadow:0 6px 0 var(--paper),0 12px 0 var(--paper)}
.name{font-family:var(--font-serif);font-size:24px;font-weight:500;letter-spacing:-0.01em;line-height:1}
.sub{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);margin-top:4px}
.divider{width:1px;height:48px;background:var(--rule)}
.map{display:flex;align-items:center;gap:14px;color:var(--ink)}
.map svg{color:var(--ink)}
</style></head><body>
<div class="lockup">
  <div class="mark"></div>
  <div><div class="name">Fuel Resilience</div><div class="sub">Australia · v1</div></div>
</div>
<div class="divider"></div>
<div class="map">
  <svg width="72" height="60" viewBox="0 0 200 180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M35 70 L28 80 L25 95 L30 110 L35 120 L40 128 L48 135 L58 140 L68 143 L78 146 L90 148 L100 150 L112 151 L125 150 L138 148 L150 144 L160 138 L168 130 L172 120 L173 108 L171 96 L168 86 L163 78 L156 72 L148 67 L140 64 L132 61 L124 58 L118 54 L112 48 L108 42 L102 38 L95 37 L88 38 L80 40 L72 44 L66 49 L60 54 L54 58 L48 62 L42 66 Z"/></svg>
  <div><div class="h4">Australia outline</div><div class="caption">Flat vector, 1.5px stroke, no fill. Used sparingly for geographic context.</div></div>
</div>
</body></html>
