<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper)}
.specimen{display:flex;align-items:baseline;gap:12px}
.unit{font-family:var(--font-sans);font-size:var(--fs-20);color:var(--ink-2);font-weight:500}
.delta{margin-left:12px}
.glyph{font-size:14px}
.desc{margin-top:8px;color:var(--ink-3);font-size:var(--fs-13)}
hr{margin:20px 0}
</style></head><body>
<div class="specimen">
  <span class="metric-numeral">24</span>
  <span class="unit">days</span>
  <span class="delta down"><span class="glyph">▼</span> 2 days MoM</span>
</div>
<p class="desc">Hero metric — Source Serif 4, 72px, tabular figures. Unit set in Inter Tight 20px to step down gracefully.</p>
<hr class="rule">
<div class="specimen">
  <span class="metric-numeral" style="font-size:var(--fs-56)">A$1.92</span>
  <span class="unit">/L</span>
  <span class="delta up"><span class="glyph">▲</span> 3.1%</span>
</div>
<p class="desc">Standard card metric — 56px. Delta glyphs (▲ ▼ —) replace pills.</p>
</body></html>
