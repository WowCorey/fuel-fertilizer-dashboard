<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

.label{width:120px;color:var(--ink-3);font-size:var(--fs-12);text-transform:uppercase;letter-spacing:.08em;font-weight:600}

.spec b{color:var(--ink-2);font-weight:500}

<div class="row"><span class="label">H1 / Serif</span><span class="h1">Days of Net Import Cover</span></div>
<div class="row"><span class="label">H2 / Serif</span><span class="h2">What changed this month</span></div>
<div class="row"><span class="label">H3 / Sans</span><span class="h3">National Fuel Price</span></div>
<div class="row"><span class="label">H4 / Sans</span><span class="h4">Methodology note</span></div>
<div class="row" style="align-items:center"><span class="label">Eyebrow</span><span class="eyebrow">Headline Metrics</span></div>
</body></html>
