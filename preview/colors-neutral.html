<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{padding:24px;background:var(--paper)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.sw{border:1px solid var(--rule);border-radius:var(--r-2);overflow:hidden;background:var(--card)}
.chip{height:64px}
.meta{padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.name{font-size:var(--fs-13);font-weight:600;color:var(--ink)}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#F7F6F2;border-bottom:1px solid var(--rule)"></div><div class="meta"><span class="name">Paper</span><span class="hex">#F7F6F2</span></div></div>
  <div class="sw"><div class="chip" style="background:#EFEDE6"></div><div class="meta"><span class="name">Paper Sunk</span><span class="hex">#EFEDE6</span></div></div>
  <div class="sw"><div class="chip" style="background:#E4E1D8"></div><div class="meta"><span class="name">Rule</span><span class="hex">#E4E1D8</span></div></div>
  <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="meta"><span class="name">Ink 4</span><span class="hex">#9CA3AF</span></div></div>
  <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><span class="name">Ink 3</span><span class="hex">#6B7280</span></div></div>
  <div class="sw"><div class="chip" style="background:#3A4150"></div><div class="meta"><span class="name">Ink 2</span><span class="hex">#3A4150</span></div></div>
  <div class="sw"><div class="chip" style="background:#14181F"></div><div class="meta"><span class="name">Ink</span><span class="hex">#14181F</span></div></div>
  <div class="sw"><div class="chip" style="background:#1F3A8A"></div><div class="meta"><span class="name">Accent</span><span class="hex">#1F3A8A</span></div></div>
  <div class="sw"><div class="chip" style="background:#172E6E"></div><div class="meta"><span class="name">Accent Hover</span><span class="hex">#172E6E</span></div></div>
  <div class="sw"><div class="chip" style="background:#E8ECF7"></div><div class="meta"><span class="name">Accent Tint</span><span class="hex">#E8ECF7</span></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><span class="name">Card</span><span class="hex">#FFFFFF</span></div></div>
  <div class="sw"><div class="chip" style="background:#C9C5B8"></div><div class="meta"><span class="name">Rule Strong</span><span class="hex">#C9C5B8</span></div></div>
</div>
</body></html>
