<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px;background:var(--paper)}
.card{padding:24px;max-width:360px}
.eyebrow{margin-bottom:12px;display:block}
.row{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.num{font-family:var(--font-serif);font-size:56px;line-height:1.08;font-weight:500;letter-spacing:-0.01em}
.unit{font-size:18px;color:var(--ink-2);font-weight:500}
.sub{font-size:var(--fs-13);color:var(--ink-3);margin-top:10px;border-top:1px solid var(--rule);padding-top:10px}
.threshold{color:var(--caution);font-weight:600}
</style></head><body>
<div class="card">
  <span class="eyebrow">Headline metric</span>
  <div class="row">
    <span class="num">24</span><span class="unit">days</span>
    <span class="delta down" style="margin-left:auto">▼ 2 days MoM</span>
  </div>
  <p class="body-sm" style="color:var(--ink-2);margin:0">Days of Net Import Cover</p>
  <p class="sub"><span class="threshold">Below</span> IEA 90-day obligation · ABS Petroleum Statistics, Mar 2026</p>
</div>
</body></html>
