<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oil & production — Fuel Resilience AU</title>
<meta name="description" content="Crude benchmarks, Australian refined output and government fuel-security spending with transparent source availability.">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="../shared/data-loader.js"></script>
<script type="text/babel" src="../shared/Header.jsx"></script>
<script type="text/babel" src="../shared/MetricCard.jsx"></script>
<script type="text/babel" src="../shared/ChartCard.jsx"></script>
<script type="text/babel" src="../shared/InsightFeed.jsx"></script>
<script type="text/babel" src="../shared/Footer.jsx"></script>

<script type="text/babel">
const SERIES = [
  'eia_brent',
  'eia_wti',
  'tapis_crude',
  'aps_monthly',
  'iea_90day',
  'fuel_security_payment',
  'aud_usd_rba',
];

// Transform a USD/bbl envelope into AUD/bbl using the AUD/USD series, if both
// are available and populated. Falls back to "unavailable" if either is missing.
function toAud(usdEnv, fxEnv) {
  if (!usdEnv || usdEnv.status !== 'ok' || !usdEnv.values?.length) return { ...usdEnv, status: 'unavailable', values: [] };
  if (!fxEnv  || fxEnv.status  !== 'ok' || !fxEnv.values?.length)  return { ...usdEnv, status: 'unavailable', values: [], notes: 'AUD/USD series unavailable; AUD conversion pending.' };
  const fxByMonth = Object.fromEntries(fxEnv.values.map(p => [p.t, p.v]));
  const values = usdEnv.values
    .map(p => {
      const fx = fxByMonth[p.t];
      return fx ? { t: p.t, v: +(p.v / fx).toFixed(2) } : null;
    })
    .filter(Boolean);
  return {
    ...usdEnv,
    unit: 'AUD per barrel',
    values,
    notes: 'Converted from USD using RBA monthly AUD/USD.',
  };
}

function App() {
  const [data, setData] = React.useState(null);
  React.useEffect(() => { window.FR.load(SERIES).then(setData); }, []);

  if (!data) {
    return (
      <div className="page">
        <Header active="oil"/>
        <main id="main"><div className="loading-wrap">Loading source envelopes...</div></main>
      </div>
    );
  }

  const latestRetrieved = window.FR.latestVerifiedRetrieved(data);
  const updatedDisplay = window.FR.fmtVerifiedUpdated(latestRetrieved);

  const brentAud = toAud(data.eia_brent, data.aud_usd_rba);
  const wtiAud   = toAud(data.eia_wti,   data.aud_usd_rba);

  // Derived per-fuel production envelopes (will surface as unavailable until APS is wired).
  const prodPetrol  = { status: 'unavailable', source_name: 'APS — motor spirit production', source_url: data.aps_monthly.source_url };
  const prodDiesel  = { status: 'unavailable', source_name: 'APS — diesel production',       source_url: data.aps_monthly.source_url };
  const prodJet     = { status: 'unavailable', source_name: 'APS — jet fuel production',     source_url: data.aps_monthly.source_url };
  const prodFuelOil = { status: 'unavailable', source_name: 'APS — fuel oil production',     source_url: data.aps_monthly.source_url };
  const utilisation = { status: 'unavailable', source_name: 'APS — refinery utilisation',    source_url: data.aps_monthly.source_url };

  return (
    <div className="page">
      <Header active="oil" updated={latestRetrieved ? updatedDisplay : ''}/>

      <main id="main">
        {/* INTRO */}
        <section className="intro" id="oil">
          <div>
            <span className="eyebrow">Oil &amp; production · v1.2</span>
            <h1 style={{ marginTop: 12 }}>What crude costs, what we refine, and what the government pays.</h1>
            <p className="intro__lede">
              Four views: the global crude benchmarks that set the floor on pump prices; Australia's
              shrinking refining sector; the stockpile gap against our international obligation; and
              how much the Australian taxpayer spends to keep refineries and storage open. Values appear
              only when the named source envelope is verified.
            </p>
          </div>
          <aside className="intro__meta" aria-label="Publication details">
            <strong>Verified data retrieved</strong>
            <span className="mono">{updatedDisplay}</span>
            <div style={{ height: 12 }}/>
            <strong>Refresh</strong>
            <span>Programmatic weekly · manual values after verification</span>
          </aside>
        </section>

        {/* WHAT THIS PAGE SHOWS */}
        <section className="section section--why">
          <div className="why-grid">
            <div>
              <span className="eyebrow">What this is</span>
              <h2 style={{ marginTop: 8 }}>What this page shows</h2>
            </div>
            <div className="why-body">
              <p>
                Crude oil is the raw input for petrol, diesel and jet fuel. Australia buys most of
                its crude on global markets, priced in US dollars per barrel. The three benchmarks
                that matter are <b>Brent</b> (North Sea), <b>WTI</b> (US) and <b>Tapis</b>
                (Malaysia — most relevant to Asian refineries).
              </p>
              <p>
                Australia still refines a share of the fuel it consumes, but refineries have closed
                steadily for 15 years. The government now pays the two remaining operators to stay
                open. This page keeps those topics together while leaving unavailable production and
                payment figures blank until a public source is hand-keyed.
              </p>
              <p className="body-sm" style={{ color: 'var(--ink-3)', marginTop: 12 }}>
                Acronyms: <b>WTI</b> = West Texas Intermediate. <b>APS</b> = Australian Petroleum Statistics.
                <b> IEA</b> = International Energy Agency. <b>FSSP</b> = Fuel Security Services Payment.
              </p>
            </div>
          </div>
        </section>

        {/* 1 — CRUDE PRICES */}
        <section className="section" aria-labelledby="h-crude">
          <div className="section__head">
            <div>
              <span className="eyebrow">Section 1</span>
              <h2 id="h-crude">Crude oil price — the floor beneath the pump</h2>
              <p className="section__lede">
                Monthly averages over the last five years where verified public source envelopes are available.
                US$ and A$ views are shown side-by-side only when the currency series is also verified.
              </p>
            </div>
          </div>

          <div className="charts-grid">
            <ChartCard
              eyebrow="US$"
              title="Brent crude — US$/barrel"
              unit="USD per barrel"
              fromEnvelope={data.eia_brent}
              ranges={['1Y','3Y','5Y']}
              defaultRange="3Y"
              accent="#1F3A8A"
              takeaway="Brent is the North Sea benchmark and the most-quoted global crude price. Higher Brent, higher Australian pump prices — usually within 2–4 weeks."
              yAxisLabel="US dollars per barrel"
            />
            <ChartCard
              eyebrow="A$"
              title="Brent crude — A$/barrel"
              unit="AUD per barrel"
              fromEnvelope={brentAud}
              ranges={['1Y','3Y','5Y']}
              defaultRange="3Y"
              accent="#0F766E"
              takeaway="Same Brent series converted using the RBA monthly AUD/USD. A weakening Australian dollar makes crude more expensive even when the US$ price is flat."
              yAxisLabel="Australian dollars per barrel"
            />
          </div>
          <div style={{ height: 24 }}/>
          <div className="charts-grid">
            <ChartCard
              eyebrow="US$"
              title="WTI crude — US$/barrel"
              unit="USD per barrel"
              fromEnvelope={data.eia_wti}
              ranges={['1Y','3Y','5Y']}
              defaultRange="3Y"
              accent="#B45309"
              takeaway="WTI is the US benchmark. Shown here for comparison — Brent is the more relevant benchmark for Asian-sourced fuel."
              yAxisLabel="US dollars per barrel"
            />
            <ChartCard
              eyebrow="A$"
              title="Tapis crude — A$/barrel"
              unit="AUD per barrel"
              fromEnvelope={data.tapis_crude}
              accent="#991B1B"
              takeaway="Tapis is the Malaysian light-sweet crude most relevant to Asian refineries supplying Australia. The public Tapis series is owned by Platts and not freely licensable — this chart populates if a public mirror becomes available."
              yAxisLabel="Australian dollars per barrel"
            />
          </div>
        </section>

        {/* 2 — REFINED PRODUCTION */}
        <section className="section" aria-labelledby="h-prod">
          <div className="section__head">
            <div>
              <span className="eyebrow">Section 2</span>
              <h2 id="h-prod">Australian refined fuel production</h2>
              <p className="section__lede">
                Monthly output of petrol, diesel, jet fuel and fuel oil from Australia's two remaining
                refineries (Lytton, QLD and Geelong, VIC), against domestic consumption. Cards remain
                unavailable until APS subseries are wired into verified envelopes.
              </p>
            </div>
          </div>
          <div className="metric-grid metric-grid--4">
            <MetricCard eyebrow="Petrol"   label="Motor spirit production" plain="Volume refined domestically in the latest month." fromEnvelope={prodPetrol}  unit=" ML"/>
            <MetricCard eyebrow="Diesel"   label="Diesel production"       plain="Volume refined domestically in the latest month." fromEnvelope={prodDiesel}  unit=" ML"/>
            <MetricCard eyebrow="Jet"      label="Jet fuel production"     plain="Volume refined domestically in the latest month." fromEnvelope={prodJet}     unit=" ML"/>
            <MetricCard eyebrow="Fuel oil" label="Fuel oil production"     plain="Volume refined domestically in the latest month." fromEnvelope={prodFuelOil} unit=" ML"/>
          </div>
          <div style={{ height: 24 }}/>
          <div className="charts-grid charts-grid--full">
            <ChartCard
              eyebrow="Utilisation"
              title="Refinery utilisation rate"
              unit="%"
              fromEnvelope={utilisation}
              accent="#1F3A8A"
              takeaway="Share of installed capacity actually running. Falls during maintenance and when margins are thin."
              yAxisLabel="Percent of installed capacity"
            />
          </div>
        </section>

        {/* 3 — GOVERNMENT PURCHASES */}
        <section className="section" aria-labelledby="h-gov">
          <div className="section__head">
            <div>
              <span className="eyebrow">Section 3</span>
              <h2 id="h-gov">Government purchases and strategic reserve</h2>
              <p className="section__lede">
                Australia is an IEA member and is obliged to hold 90 days of net imports. This section
                shows the gap, refinery/storage payments and offshore tickets only when the underlying
                public source has been verified.
              </p>
            </div>
          </div>
          <div className="metric-grid">
            <MetricCard
              eyebrow="IEA gap"
              label="Days below the 90-day obligation"
              plain="How many days short of the IEA benchmark Australia's stockpile currently runs."
              fromEnvelope={data.iea_90day}
              unit=" days"
              threshold={{ state:'below', text:'Benchmark: 90 days' }}
              highlight
            />
            <MetricCard
              eyebrow="Cost"
              label="Fuel Security Services Payment — latest FY"
              plain="Total spent by the Commonwealth under the FSSP in the most recent financial year."
              fromEnvelope={data.fuel_security_payment}
              unit=" A$m"
            />
            <MetricCard
              eyebrow="Contracts"
              label="Offshore ticket volumes"
              plain="Volume of 'tickets' — rights to draw on oil stocks held overseas — disclosed publicly for the latest year."
              fromEnvelope={{ status: 'unavailable', source_name: 'DCCEEW — offshore ticket disclosures', source_url: 'https://www.energy.gov.au/' }}
              unit=" kL"
            />
          </div>
        </section>

        {/* WHAT CHANGED */}
        <section className="section">
          <InsightFeed
            items={[]}
            title="What changed"
            lede="Populated as verified APS / IEA / DCCEEW releases land."
            emptyMessage="Awaiting verified release notes for the loaded oil and production source envelopes."
          />
        </section>

        {/* SOURCES */}
        <section className="section section--sources" id="sources">
          <div className="section__head">
            <div>
              <span className="eyebrow">Sources &amp; methodology</span>
              <h2>Every dataset used on this page</h2>
              <p className="section__lede">All sources are public. Cards marked "Source unavailable" are awaiting verified values.</p>
            </div>
          </div>
          <div className="sources-grid">
            {Object.entries(data).map(([id, env]) => (
              <article key={id} className="source-card">
                <h4>{env.source_name}</h4>
                <p className="body-sm">
                  {env.status === 'ok'
                    ? `Verified. ${env.values.length} data points; latest ${env.last_data_point || 'unknown'}.`
                    : 'Awaiting hand-keyed values from the named public source.'}
                </p>
                <p className="caption"><b>Envelope:</b> <span className="mono">{id}</span></p>
                {env.source_url && <a href={env.source_url}>{env.source_url.replace(/^https?:\/\//,'')} <Icon name="external" size={12}/></a>}
                <p className="caption mono">Retrieved: {env.retrieved_at ? window.FR.fmtRetrieved(env.retrieved_at) : '—'}</p>
              </article>
            ))}
          </div>
          <div className="methodology">
            <h3>How we calculate the numbers</h3>
            <dl>
              <dt>Crude A$ conversion</dt>
              <dd>USD-denominated monthly spot series divided by the RBA monthly average AUD/USD for the same month. No hedging or lag applied.</dd>
              <dt>Days below the 90-day obligation</dt>
              <dd>Australia's reported net import cover in days, subtracted from 90. Only populated when DCCEEW publishes the underlying net-imports figure.</dd>
              <dt>Fuel Security Services Payment</dt>
              <dd>Commonwealth payments to Ampol (Lytton) and Viva Energy (Geelong) under the FSSP, as disclosed in the DCCEEW annual report and Portfolio Budget Statements.</dd>
            </dl>
          </div>
        </section>

        <Footer updated={latestRetrieved ? updatedDisplay : ''}/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
